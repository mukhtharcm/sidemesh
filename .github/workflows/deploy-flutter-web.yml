name: Deploy Flutter Web App

on:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - ".github/workflows/deploy-flutter-web.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app.sidemesh.com
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.7"
          channel: stable
          cache: true

      - name: Install, analyze, and build
        working-directory: apps/mobile
        run: |
          flutter pub get
          flutter analyze
          flutter build web --release -t lib/main_web.dart --no-web-resources-cdn

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/mobile
          command: pages deploy build/web --project-name sidemesh-app --branch main --commit-dirty=true
