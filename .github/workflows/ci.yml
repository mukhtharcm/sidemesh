name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  server:
    name: Server checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Test server
        run: npm run test:server

      - name: Build package
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

  mobile:
    name: Flutter checks
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.7"
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Run Flutter tests
        working-directory: apps/mobile
        run: flutter test

      - name: Analyze Flutter app
        working-directory: apps/mobile
        run: flutter analyze

      - name: Build Flutter web app
        working-directory: apps/mobile
        run: flutter build web --release -t lib/main_web.dart --no-web-resources-cdn

  web:
    name: Website checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check content and types
        run: npm run check

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build website
        run: npm run build
