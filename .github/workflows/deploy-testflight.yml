name: Deploy to TestFlight

on:
  workflow_dispatch:
    inputs:
      resume_existing_build:
        description: "Resume metadata and internal distribution for the committed version/build without rebuilding or uploading."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.44.7"
  ASC_BUNDLE_ID: "dev.sidemesh.mobile"
  ASC_BYPASS_KEYCHAIN: "1"
  ASC_DEFAULT_OUTPUT: "json"
  ASC_NO_UPDATE: "1"

jobs:
  build-and-deploy:
    name: Build and upload iOS app
    runs-on: macos-26
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up App Store Connect CLI
        uses: rudrankriyam/setup-asc@v1
        with:
          version: 1.4.1

      - name: Verify required secrets
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          IOS_APP_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_APP_PROVISION_PROFILE_BASE64 }}
          IOS_DISTRIBUTION_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_EXTENSION_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_EXTENSION_PROVISION_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          missing=()
          for name in \
            ASC_ISSUER_ID \
            ASC_KEY_BASE64 \
            ASC_KEY_ID \
            IOS_APP_PROVISION_PROFILE_BASE64 \
            IOS_DISTRIBUTION_CERT_BASE64 \
            IOS_DISTRIBUTION_CERT_PASSWORD \
            IOS_EXTENSION_PROVISION_PROFILE_BASE64 \
            IOS_KEYCHAIN_PASSWORD
          do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} )); then
            printf 'Missing required GitHub secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Resolve App Store Connect app record
        id: asc_app
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          apps_json="$(asc apps list --bundle-id "$ASC_BUNDLE_ID" --output json)"
          app_count="$(printf '%s' "$apps_json" | jq '.data | length')"
          if [[ "$app_count" -eq 0 ]]; then
            echo "No App Store Connect app record exists for $ASC_BUNDLE_ID." >&2
            echo "Create the app once in App Store Connect, then rerun this workflow." >&2
            exit 1
          fi

          app_id="$(printf '%s' "$apps_json" | jq -r '.data[0].id')"
          app_name="$(printf '%s' "$apps_json" | jq -r '.data[0].attributes.name')"
          app_bundle_id="$(printf '%s' "$apps_json" | jq -r '.data[0].attributes.bundleId')"

          echo "app_id=$app_id" >> "$GITHUB_OUTPUT"
          echo "Resolved App Store Connect app: $app_name ($app_bundle_id, $app_id)"

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Set up Ruby for CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Install pods
        working-directory: apps/mobile/ios
        run: pod install --repo-update

      - name: Import signing certificate
        env:
          CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          certificate_path="$RUNNER_TEMP/sidemesh-ios-distribution.p12"
          keychain_path="$RUNNER_TEMP/sidemesh-ios-signing.keychain-db"

          echo -n "$CERT_BASE64" | base64 --decode -o "$certificate_path"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" login.keychain-db
          security default-keychain -d user -s "$keychain_path"

      - name: Install provisioning profiles
        env:
          APP_PROFILE_BASE64: ${{ secrets.IOS_APP_PROVISION_PROFILE_BASE64 }}
          EXTENSION_PROFILE_BASE64: ${{ secrets.IOS_EXTENSION_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"

          install_profile() {
            local encoded="$1"
            local name="$2"
            local path="$RUNNER_TEMP/$name.mobileprovision"

            echo -n "$encoded" | base64 --decode -o "$path"
            local uuid
            uuid="$(security cms -D -i "$path" | plutil -extract UUID raw -)"
            cp "$path" "$HOME/Library/MobileDevice/Provisioning Profiles/$uuid.mobileprovision"
            echo "Installed provisioning profile: $name ($uuid)"
          }

          install_profile "$APP_PROFILE_BASE64" "sidemesh-appstore-app"
          install_profile "$EXTENSION_PROFILE_BASE64" "sidemesh-appstore-live-activity-extension"

      - name: Configure manual signing for CI
        working-directory: apps/mobile/ios
        run: |
          python3 << 'PYEOF'
          import re
          from pathlib import Path

          project_path = Path("Runner.xcodeproj/project.pbxproj")
          lines = project_path.read_text().splitlines(keepends=True)

          profiles = {
              "dev.sidemesh.mobile": "Sidemesh AppStore Distribution 20260430-075335",
              "dev.sidemesh.mobile.LiveActivityExtension": "Sidemesh Live Activity Extension AppStore Distribution 20260430-075335",
          }

          def setting_value(block, key):
              pattern = re.compile(rf"\s*{re.escape(key)} = ([^;]+);")
              for line in block:
                  match = pattern.match(line)
                  if match:
                      return match.group(1).strip().strip('"')
              return None

          def upsert_setting(block, key, value):
              pattern = re.compile(rf"(\s*){re.escape(key)} = [^;]+;")
              for index, line in enumerate(block):
                  match = pattern.match(line)
                  if match:
                      block[index] = f"{match.group(1)}{key} = {value};\n"
                      return

              indent = "\t\t\t\t"
              for line in block:
                  if "PRODUCT_BUNDLE_IDENTIFIER = " in line:
                      indent = line[: len(line) - len(line.lstrip())]
                      break

              for index in range(len(block) - 1, -1, -1):
                  if re.match(r"\s*\};", block[index]):
                      block.insert(index, f"{indent}{key} = {value};\n")
                      return

              raise RuntimeError(f"Could not insert {key}; build settings block was not recognized")

          patched_profiles = set()
          output = []
          index = 0

          while index < len(lines):
              if re.match(r"\s*buildSettings = \{", lines[index]):
                  block = [lines[index]]
                  index += 1

                  while index < len(lines):
                      block.append(lines[index])
                      if re.match(r"\s*\};", lines[index]):
                          index += 1
                          break
                      index += 1

                  bundle_id = setting_value(block, "PRODUCT_BUNDLE_IDENTIFIER")
                  profile = profiles.get(bundle_id or "")
                  if profile:
                      upsert_setting(block, "DEVELOPMENT_TEAM", "SMKA33JW93")
                      upsert_setting(block, "CODE_SIGN_STYLE", "Manual")
                      upsert_setting(block, "CODE_SIGN_IDENTITY", '"Apple Distribution"')
                      upsert_setting(block, '"CODE_SIGN_IDENTITY[sdk=iphoneos*]"', '"Apple Distribution"')
                      upsert_setting(block, "PROVISIONING_PROFILE_SPECIFIER", f'"{profile}"')
                      patched_profiles.add(profile)

                  output.extend(block)
                  continue

              output.append(lines[index])
              index += 1

          missing = set(profiles.values()) - patched_profiles
          if missing:
              raise RuntimeError(f"Did not configure provisioning profiles: {', '.join(sorted(missing))}")

          project_path.write_text("".join(output))
          print(f"Configured manual signing for {len(patched_profiles)} Sidemesh prod targets")
          PYEOF

      - name: Determine version
        id: version
        run: |
          pubspec_version="$(grep '^version:' apps/mobile/pubspec.yaml | sed -E 's/^version:[[:space:]]*//')"
          if [[ ! "$pubspec_version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\+[1-9][0-9]*$ ]]; then
            echo "apps/mobile/pubspec.yaml version must be X.Y.Z+N for TestFlight, got: $pubspec_version" >&2
            echo "Run: npm run mobile:version -- <next-version+build>" >&2
            exit 1
          fi

          version="${pubspec_version%%+*}"
          build_number="${pubspec_version##*+}"

          echo "pubspec_version=$pubspec_version" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "Building Sidemesh iOS $version ($build_number) from committed pubspec"

      - name: Install Python dependencies for ASC scripts
        run: python3 -m pip install pyjwt --quiet --break-system-packages

      - name: Generate release notes
        run: python3 scripts/generate-release-notes.py

      - name: Validate TestFlight version/build
        if: inputs.resume_existing_build != true
        id: resolve_build_number
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          BUILD_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
        run: python3 scripts/resolve-build-number.py

      - name: Build IPA
        if: inputs.resume_existing_build != true
        working-directory: apps/mobile
        run: |
          flutter build ipa \
            --release \
            --flavor prod \
            --build-name="${{ steps.version.outputs.version }}" \
            --build-number="${{ steps.resolve_build_number.outputs.build_number || steps.version.outputs.build_number }}" \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload build to App Store Connect
        if: inputs.resume_existing_build != true
        id: upload_build
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_KEY_BASE64 }}
          BUILD_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.resolve_build_number.outputs.build_number || steps.version.outputs.build_number }}
        run: |
          shopt -s nullglob
          ipa_files=(apps/mobile/build/ios/ipa/*.ipa)
          if (( ${#ipa_files[@]} != 1 )); then
            echo "Expected exactly one IPA artifact, found ${#ipa_files[@]}." >&2
            exit 1
          fi

          ipa_path="${ipa_files[0]}"
          echo "ipa_path=$ipa_path" >> "$GITHUB_OUTPUT"

          asc builds upload \
            --app "${{ steps.asc_app.outputs.app_id }}" \
            --ipa "$ipa_path" \
            --version "$BUILD_VERSION" \
            --build-number "$BUILD_NUMBER" \
            --platform IOS \
            --wait

      - name: Resolve TestFlight build
        id: testflight_build
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_KEY_BASE64 }}
          BUILD_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.resolve_build_number.outputs.build_number || steps.version.outputs.build_number }}
        run: |
          build_json="$(asc builds info --app "${{ steps.asc_app.outputs.app_id }}" --version "$BUILD_VERSION" --build-number "$BUILD_NUMBER" --platform IOS --output json)"
          build_id="$(printf '%s' "$build_json" | jq -r '.id // .data.id // empty')"
          if [[ -z "$build_id" ]]; then
            echo "Could not resolve the TestFlight build ID for $BUILD_VERSION ($BUILD_NUMBER)." >&2
            exit 1
          fi

          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"

      - name: Ensure App Store version exists
        id: asc_version
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_KEY_BASE64 }}
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          version_json="$(asc versions list --app "${{ steps.asc_app.outputs.app_id }}" --version "$BUILD_VERSION" --platform IOS --output json)"
          version_id="$(printf '%s' "$version_json" | jq -r '.data[0].id // empty')"
          if [[ -z "$version_id" ]]; then
            set +e
            create_json="$(asc versions create --app "${{ steps.asc_app.outputs.app_id }}" --version "$BUILD_VERSION" --platform IOS --output json 2>"$RUNNER_TEMP/asc-version-create-error.log")"
            create_status=$?
            set -e
            if (( create_status != 0 )); then
              echo "::warning::App Store version $BUILD_VERSION could not be created; continuing with TestFlight distribution."
              cat "$RUNNER_TEMP/asc-version-create-error.log" >&2
              echo "version_id=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            version_id="$(printf '%s' "$create_json" | jq -r '.id // .data.id // empty')"
            if [[ -z "$version_id" ]]; then
              echo "Could not resolve the App Store version ID for $BUILD_VERSION." >&2
              exit 1
            fi
            echo "Created App Store version $BUILD_VERSION ($version_id)"
          else
            echo "App Store version $BUILD_VERSION already exists ($version_id)"
          fi

          echo "version_id=$version_id" >> "$GITHUB_OUTPUT"

      - name: Attach uploaded build to the App Store version
        if: steps.asc_version.outputs.version_id != ''
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          version_json="$(asc versions view --version-id "${{ steps.asc_version.outputs.version_id }}" --include-build --output json)"
          current_build_id="$(printf '%s' "$version_json" | jq -r '.buildId // .data.buildId // .data.attributes.buildId // empty')"
          if [[ "$current_build_id" == "${{ steps.testflight_build.outputs.build_id }}" ]]; then
            echo "Uploaded build is already attached to version ${{ steps.version.outputs.version }}."
            exit 0
          fi

          asc versions attach-build \
            --version-id "${{ steps.asc_version.outputs.version_id }}" \
            --build "${{ steps.testflight_build.outputs.build_id }}"

      - name: Sync release notes onto the App Store version
        if: steps.asc_version.outputs.version_id != ''
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          if [[ ! -s release-notes.txt ]]; then
            echo "No release-notes.txt generated; skipping What's New sync."
            exit 0
          fi

          release_notes="$(cat release-notes.txt)"
          version_locale_json="$(asc localizations list --version "${{ steps.asc_version.outputs.version_id }}" --output json)"
          version_locale="$(printf '%s' "$version_locale_json" | jq -r '.data[0].attributes.locale // empty')"

          if [[ -n "$version_locale" ]]; then
            asc apps info edit \
              --version-id "${{ steps.asc_version.outputs.version_id }}" \
              --locale "$version_locale" \
              --whats-new "$release_notes"
            exit 0
          fi

          app_info_json="$(asc localizations list --app "${{ steps.asc_app.outputs.app_id }}" --type app-info --locale "en-US" --output json)"
          description="$(printf '%s' "$app_info_json" | jq -r '.data[0].attributes.description // empty')"
          keywords="$(printf '%s' "$app_info_json" | jq -r '.data[0].attributes.keywords // empty')"
          support_url="$(printf '%s' "$app_info_json" | jq -r '.data[0].attributes.supportUrl // empty')"

          if [[ -z "$description" || -z "$keywords" || -z "$support_url" ]]; then
            echo "Skipping What's New sync because the app is missing submit-required en-US metadata." >&2
            exit 0
          fi

          asc apps info edit \
            --version-id "${{ steps.asc_version.outputs.version_id }}" \
            --locale "en-US" \
            --description "$description" \
            --keywords "$keywords" \
            --support-url "$support_url" \
            --whats-new "$release_notes"

      - name: Update App Store Connect metadata
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          SIDEMESH_PRIVACY_URL: ${{ vars.SIDEMESH_PRIVACY_URL }}
          SIDEMESH_SUPPORT_URL: ${{ vars.SIDEMESH_SUPPORT_URL }}
        run: python3 scripts/update-asc-metadata.py

      - name: Set App Store Connect age rating
        continue-on-error: true
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: python3 scripts/set-age-rating.py

      - name: Set app review details
        continue-on-error: true
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          SIDEMESH_REVIEW_CONTACT_FIRST: ${{ vars.SIDEMESH_REVIEW_CONTACT_FIRST }}
          SIDEMESH_REVIEW_CONTACT_LAST: ${{ vars.SIDEMESH_REVIEW_CONTACT_LAST }}
          SIDEMESH_REVIEW_CONTACT_EMAIL: ${{ vars.SIDEMESH_REVIEW_CONTACT_EMAIL }}
          SIDEMESH_REVIEW_CONTACT_PHONE: ${{ vars.SIDEMESH_REVIEW_CONTACT_PHONE }}
          SIDEMESH_REVIEW_DEMO_ACCOUNT: ${{ vars.SIDEMESH_REVIEW_DEMO_ACCOUNT }}
          SIDEMESH_REVIEW_DEMO_PASSWORD: ${{ vars.SIDEMESH_REVIEW_DEMO_PASSWORD }}
          SIDEMESH_REVIEW_NOTES: ${{ vars.SIDEMESH_REVIEW_NOTES }}
        run: python3 scripts/set-app-review-details.py

      - name: Set app category
        continue-on-error: true
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          SIDEMESH_PRIMARY_CATEGORY: ${{ vars.SIDEMESH_PRIMARY_CATEGORY }}
          SIDEMESH_SECONDARY_CATEGORY: ${{ vars.SIDEMESH_SECONDARY_CATEGORY }}
        run: python3 scripts/set-app-category.py

      - name: Add uploaded build to internal TestFlight groups
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          groups_json="$(asc testflight groups list --app "${{ steps.asc_app.outputs.app_id }}" --output json)"
          internal_groups="$(printf '%s' "$groups_json" | jq -r '[.data[] | select(.attributes.isInternalGroup == true) | .id] | join(",")')"
          if [[ -z "$internal_groups" ]]; then
            echo "No internal TestFlight groups found; skipping distribution."
            exit 0
          fi

          asc builds add-groups \
            --build-id "${{ steps.testflight_build.outputs.build_id }}" \
            --group "$internal_groups"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Sidemesh-${{ steps.version.outputs.version }}-ios-ipa
          path: apps/mobile/build/ios/ipa/*.ipa
          if-no-files-found: ignore
          retention-days: 14

      - name: Write deployment summary
        if: always()
        run: |
          {
            echo "## Sidemesh TestFlight"
            echo
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Build number: ${{ steps.resolve_build_number.outputs.build_number || steps.version.outputs.build_number }}"
            echo "- Source: apps/mobile/pubspec.yaml"
            echo "- Flavor: prod"
            echo "- App bundle: dev.sidemesh.mobile"
            echo "- Extension bundle: dev.sidemesh.mobile.LiveActivityExtension"
            echo "- Resumed existing build: ${{ inputs.resume_existing_build }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up signing files
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/sidemesh-ios-signing.keychain-db" || true
          rm -f "$RUNNER_TEMP"/sidemesh-ios-distribution.p12
          rm -f "$RUNNER_TEMP"/sidemesh-appstore-app.mobileprovision
          rm -f "$RUNNER_TEMP"/sidemesh-appstore-live-activity-extension.mobileprovision
