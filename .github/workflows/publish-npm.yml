name: Publish npm Package

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  publish:
    name: Publish to npm
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'npm-v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify npm release tag
        if: github.event_name == 'release'
        run: |
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="npm-v$package_version"
          actual_tag="${{ github.event.release.tag_name }}"

          if [[ "$actual_tag" != "$expected_tag" ]]; then
            echo "Release tag $actual_tag does not match package.json version $package_version." >&2
            echo "Expected npm release tag: $expected_tag" >&2
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Test server
        run: npm run test:server

      - name: Build package
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish
        run: npm publish --access public
