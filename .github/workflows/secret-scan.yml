name: Secret Scan

on:
  workflow_dispatch:

jobs:
  gitleaks:
    name: Full git history scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
