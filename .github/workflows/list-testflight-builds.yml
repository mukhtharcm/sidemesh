name: List TestFlight Builds

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  list-builds:
    name: List ASC builds
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pyjwt
        run: python3 -m pip install pyjwt --quiet

      - name: List builds
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: python3 scripts/cleanup-old-builds.py
