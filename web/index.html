<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>sidemesh · coming soon</title>
<meta name="description" content="Codex from your pocket. Pre-release." />
<meta name="theme-color" content="#FAF7EF" />
<link rel="icon" type="image/png" href="/assets/favicon.png" />
<link rel="apple-touch-icon" href="/assets/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#FAF7EF; --ink:#1A1B22; --muted:#7C7A73; --rust:#B8542A; --rule:#D4CCBA; }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}
  .wrap{max-width:640px;margin:0 auto;padding:72px 28px;flex:1;}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:56px;}
  .brand img{width:28px;height:28px;border-radius:6px;}
  .brand span{font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.06em;font-weight:600;}
  h1{font-size:44px;line-height:1.08;letter-spacing:-0.02em;font-weight:700;margin:0 0 20px;}
  h1 em{font-style:normal;color:var(--rust);}
  .lede{font-size:17px;color:#3E4151;max-width:48ch;margin:0 0 36px;}
  .mono{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  form{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 32px;max-width:480px;}
  input[type=email]{flex:1;min-width:220px;background:transparent;border:1px solid var(--ink);color:var(--ink);padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:13px;border-radius:4px;}
  button{border:0;background:var(--ink);color:var(--bg);padding:12px 22px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;border-radius:4px;cursor:pointer;}
  button:hover{background:var(--rust);}
  .platforms{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);letter-spacing:0.04em;}
  footer{border-top:1px solid var(--rule);padding:22px 28px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;color:var(--muted);}
</style>
</head>
<body>
  <div class="wrap">
    <a class="brand" href="/">
      <img src="/assets/app-icon.png" alt="" />
      <span>sidemesh</span>
    </a>

    <p class="mono">pre-release</p>
    <h1>Codex, from your pocket. <em>Almost.</em></h1>
    <p class="lede">Sidemesh is a mobile control surface for Codex &mdash; a lightweight app in your hand, a small companion on every machine you code on. No cloud broker. No account. No middleman.</p>

    <p class="mono">get notified</p>
    <form id="wl">
      <input type="email" name="email" required placeholder="you@wherever.dev" />
      <button type="submit">Notify me</button>
    </form>
    <p id="wl-msg" class="platforms" style="display:none;margin-top:-20px;margin-bottom:32px;"></p>

    <p class="platforms">iOS · Android · macOS</p>
  </div>
  <footer>© <span id="y"></span> sidemesh</footer>
  <script>
    document.getElementById('y').textContent = new Date().getFullYear();
    const f = document.getElementById('wl');
    const msg = document.getElementById('wl-msg');
    f.addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = f.querySelector('input');
      const btn = f.querySelector('button');
      const email = input.value.trim();
      btn.disabled = true; input.disabled = true;
      btn.textContent = 'sending…';
      try {
        const r = await fetch('/api/waitlist', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const j = await r.json().catch(() => ({}));
        if (r.ok && j.ok) {
          btn.textContent = 'queued ✓';
          msg.textContent = "you're on the list. one email when it ships.";
          msg.style.display = 'block';
        } else {
          btn.textContent = 'try again';
          btn.disabled = false; input.disabled = false;
          msg.textContent = j.error === 'invalid_email' ? 'that address looks off — double-check?' : 'something broke on our end. try once more?';
          msg.style.display = 'block';
        }
      } catch {
        btn.textContent = 'try again';
        btn.disabled = false; input.disabled = false;
        msg.textContent = 'no network. try once more?';
        msg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
